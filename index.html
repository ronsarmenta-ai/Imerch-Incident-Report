<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Incident Report - iMerch Media</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { 
            background-color: #f8f9fa; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .logo-container { 
            text-align: center; 
            margin: 40px 0 20px 0; 
        }
        .company-logo { 
            max-width: 280px; 
            height: auto; 
            /* Optional: Nagdagdag ako ng kaunting shadow sa logo para mas litaw */
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.05));
        }
        .card { 
            border-radius: 10px; 
            border: none; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        .card-header { 
            background-color: #000 !important; 
            color: white; 
            text-align: center;
            border-radius: 10px 10px 0 0 !important;
            padding: 15px;
        }
        .btn-dark {
            background-color: #000;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-dark:hover {
            background-color: #333;
            transform: translateY(-1px);
        }
        label {
            color: #333;
        }
    </style>
</head>
<body>

    <div class="container mb-5">
        <div class="logo-container">
            <img src="https://i.ibb.co/Xz9tH4Z/image-0.png" alt="iMerch Logo" class="company-logo">
        </div>

        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0 fw-bold text-uppercase" style="letter-spacing: 1px;">Incident Report Form</h5>
                    </div>
                    <div class="card-body p-4">
                        <form id="incidentForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Full Name</label>
                                <input type="text" id="fullname" class="form-control" placeholder="Enter reporter's name" required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Date</label>
                                    <input type="date" id="incidentDate" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Time</label>
                                    <input type="time" id="incidentTime" class="form-control" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Coordinator Name</label>
                                <input type="text" id="coordinator" class="form-control" placeholder="Name of person-in-charge" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Description of Incident</label>
                                <textarea id="description" class="form-control" rows="5" placeholder="Provide details of what happened..." required></textarea>
                            </div>
                            <button type="submit" id="btnSubmit" class="btn btn-dark w-100 fw-bold py-2">SUBMIT REPORT</button>
                        </form>
                    </div>
                </div>
                <p class="text-center mt-4 text-muted" style="font-size: 0.8rem;">
                    &copy; 2026 iMerch Media Inc. | Developed by Ronsanity
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtSsuLqWgJaZIxSFyE5I82pVAmDWNIfhs",
            authDomain: "incident-report-e815d.firebaseapp.com",
            projectId: "incident-report-e815d",
            storageBucket: "incident-report-e815d.firebasestorage.app",
            messagingSenderId: "197552481149",
            appId: "1:197552481149:web:3cb935fd71ab965d702214",
            measurementId: "G-T5YNP69E28"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const scriptURL = "https://script.google.com/macros/s/AKfycbyRch2uWVVCYAcwnnFs7vpvKYjZA0aiRfdtqiYDMlErvZRTMd53Qc7JBt2bBTWl9Jug/exec"; 

        const form = document.getElementById('incidentForm');
        const btnSubmit = document.getElementById('btnSubmit');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btnSubmit.disabled = true;
            btnSubmit.innerText = "Processing...";

            const reportData = {
                fullname: document.getElementById('fullname').value,
                date: document.getElementById('incidentDate').value,
                time: document.getElementById('incidentTime').value,
                coordinator: document.getElementById('coordinator').value,
                description: document.getElementById('description').value
            };

            try {
                // Save sa Firebase
                await addDoc(collection(db, "incidents"), { ...reportData, createdAt: serverTimestamp() });
                
                // Send Email via Google Apps Script
                await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(reportData) });
                
                alert("Success! Incident report has been saved and sent to imerch.ir@imerchmedia.net");
                form.reset();
            } catch (error) {
                console.error(error);
                alert("Error submitting report. Please check your connection.");
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "SUBMIT REPORT";
            }
        });
    </script>
</body>
</html>
