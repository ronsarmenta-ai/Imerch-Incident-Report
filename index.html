<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Incident Report - Ronsanity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .logo-container {
            text-align: center;
            margin-bottom: 25px;
        }
        .company-logo {
            max-width: 250px; 
            height: auto;
        }
        .card {
            border-radius: 12px;
            overflow: hidden;
        }
        .card-header {
            background-color: #000 !important;
        }
        body {
            background-color: #f4f7f6;
        }
    </style>
</head>
<body>

    <div class="container mt-4 mb-5">
        <div class="logo-container">
            <img src="imerch.png" alt="iMerch Logo" class="company-logo">
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header text-white p-3 text-center">
                        <h5 class="mb-0 text-uppercase fw-bold">Incident Report Form</h5>
                    </div>
                    <div class="card-body p-4">
                        <form id="incidentForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Full Name</label>
                                <input type="text" id="fullname" class="form-control" placeholder="Enter reporter's name" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Date</label>
                                    <input type="date" id="incidentDate" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Time</label>
                                    <input type="time" id="incidentTime" class="form-control" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Coordinator Name</label>
                                <input type="text" id="coordinator" class="form-control" placeholder="Name of person-in-charge" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Description of Incident</label>
                                <textarea id="description" class="form-control" rows="5" placeholder="Provide details of what happened..." required></textarea>
                            </div>

                            <button type="submit" id="btnSubmit" class="btn btn-dark w-100 p-2 fw-bold">SUBMIT REPORT</button>
                        </form>
                    </div>
                </div>
                <p class="text-center mt-3 text-muted" style="font-size: 0.8rem;">&copy; 2026 iMerch Media Inc. | Ronsanity System</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtSsuLqWgJaZIxSFyE5I82pVAmDWNIfhs",
            authDomain: "incident-report-e815d.firebaseapp.com",
            projectId: "incident-report-e815d",
            storageBucket: "incident-report-e815d.firebasestorage.app",
            messagingSenderId: "197552481149",
            appId: "1:197552481149:web:3cb935fd71ab965d702214",
            measurementId: "G-T5YNP69E28"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const form = document.getElementById('incidentForm');
        const btnSubmit = document.getElementById('btnSubmit');

        // IYONG GOOGLE APPS SCRIPT URL
        const scriptURL = "https://script.google.com/macros/s/AKfycbyRch2uWVVCYAcwnnFs7vpvKYjZA0aiRfdtqiYDMlErvZRTMd53Qc7JBt2bBTWl9Jug/exec"; 

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btnSubmit.disabled = true;
            btnSubmit.innerText = "Processing Report...";

            const reportData = {
                fullname: document.getElementById('fullname').value,
                date: document.getElementById('incidentDate').value,
                time: document.getElementById('incidentTime').value,
                coordinator: document.getElementById('coordinator').value,
                description: document.getElementById('description').value
            };

            try {
                // 1. SAVE SA FIREBASE
                await addDoc(collection(db, "incidents"), {
                    ...reportData,
                    createdAt: serverTimestamp()
                });

                // 2. SEND SA EMAIL VIA GOOGLE APPS SCRIPT
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(reportData)
                });

                alert("Success! Incident report has been saved and sent to imerch.ir@imerchmedia.net");
                form.reset();

            } catch (error) {
                console.error("Error:", error);
                alert("May error sa pag-submit. Pakicheck ang console.");
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "SUBMIT REPORT";
            }
        });
    </script>
</body>
</html>
